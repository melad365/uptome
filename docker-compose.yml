version: '3.8'

services:
  uptome:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uptome-app
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - uptome-network

  nginx:
    image: nginx:alpine
    container_name: uptome-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - uptome
    networks:
      - uptome-network

networks:
  uptome-network:
    driver: bridge

volumes:
  uptome-data:
    driver: local