events {
    worker_connections 1024;
}

http {
    upstream uptome_app {
        server uptome:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name leaveitupto.me www.leaveitupto.me;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name leaveitupto.me www.leaveitupto.me;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/leaveitupto.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/leaveitupto.me/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Security headers for HTTPS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Logs
        access_log /var/log/nginx/uptome.access.log;
        error_log /var/log/nginx/uptome.error.log;

        # Main location block
        location / {
            proxy_pass http://uptome_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;

            # Rate limiting for general requests
            limit_req zone=api burst=20 nodelay;
        }

        # API rate limiting
        location /api/ {
            proxy_pass http://uptome_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stricter rate limiting for API
            limit_req zone=api burst=10 nodelay;
        }

        # Static files caching
        location /_next/static/ {
            proxy_pass http://uptome_app;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /health {
            proxy_pass http://uptome_app;
            access_log off;
        }
    }
}